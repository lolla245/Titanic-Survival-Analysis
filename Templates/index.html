<!DOCTYPE html>
<html>
<head>
    <title>Titanic Survival Predictor</title>
</head>
<body>
    <h1>🚢 Titanic Survival Predictor</h1>

    <form action="/predict" method="post">
        <label>Passenger Class:</label>
        <select name="pclass">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
        </select>
        <br><br>

        <label>Sex:</label>
        <select name="sex">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
        <br><br>

        <label>Age:</label>
        <input type="number" name="age" min="1" max="80" value="25">
        <br><br>

        <label>Fare:</label>
        <input type="number" name="fare" min="0" max="500" value="50">
        <br><br>

        <label>Family Size:</label>
        <input type="number" name="family" min="1" max="10" value="1">
        <br><br>

        <button type="submit">Predict Survival</button>
    </form>

    {% if prediction %}
        <h2>{{ prediction }}</h2>
    {% endif %}
</body>
</html>
